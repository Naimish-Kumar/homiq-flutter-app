name: homiq
description: Welcome to Homiq.

publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core UI & Charts
  carousel_slider: ^5.1.2
  custom_refresh_indicator: ^4.0.1
  dotted_border: ^3.0.1
  flutter_html: ^3.0.0-beta.1
  flutter_svg: ^2.2.4
  flutter_typeahead: ^6.0.0
  nested: ^1.0.0

  # Firebase Services
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # Authentication & Sign-in
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.0.0-spm.1

  # Media & Visuals
  cached_network_image: ^3.4.1
  flick_video_player: ^0.9.0
  flutter_image_compress: ^2.3.0
  image_cropper: ^12.2.0
  image_picker: ^1.2.0
  panorama_viewer: ^2.0.4
  video_player: ^2.11.1
  youtube_explode_dart: 3.0.5
  youtube_player_flutter: ^9.1.1

  # Audio
  just_audio: ^0.10.0
  record: ^6.0.0

  # Animations
  lottie: ^3.3.3
  shimmer: ^3.0.0

  # Networking & HTTP
  connectivity_plus: ^7.1.1
  dio: ^5.9.2
  http: ^1.0.0
  http_parser: 4.1.2

  # State Management & Storage
  flutter_bloc: ^9.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5

  # Location & Maps
  geocoding: ^4.0.0
  geolocator: ^14.0.0
  google_maps_flutter: ^2.17.0
  webview_flutter: ^4.11.0

  # Pickers & Input
  country_picker: ^2.0.26
  file_picker: ^11.0.2
  sms_autofill: ^2.4.0

  # Utilities & Tools
  device_info_plus:
  fluttertoast: ^9.0.0
  intl: ^0.20.0
  open_filex: ^4.6.0
  package_info_plus: 
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  printing: ^5.14.3
  share_plus: 
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  very_good_analysis: ^10.2.0
  pointycastle: ^4.0.0
  
  # Payment Gateways
  flutter_stripe: ^12.6.0
  in_app_purchase: ^3.2.0
  razorpay_flutter: ^1.4.4

  # Notifications & Reviews
  awesome_notifications: ^0.11.0
  google_mobile_ads: ^7.0.0
  in_app_review: ^2.0.10

  # PDF Generation
  flutter_html_to_pdf: ^0.7.0

  # Moved from dependencies_overrides
  web: ^1.0.0
  
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icons/ic_launcher.png"
  remove_alpha_ios: true


flutter:
  uses-material-design: true

  assets:
    - assets/languages/
    - assets/lottie/
    - assets/city.jpg
    - assets/map.png
    - assets/location_rent.png
    - assets/location_sell.png
    - assets/location_selected.png
    - assets/login_background.png

  fonts:
    - family: PrimaryFont 
      fonts:
        - asset: assets/fonts/Railway-Regular.ttf
        - asset: assets/fonts/Railway-Medium.ttf
          weight: 500
        - asset: assets/fonts/Railway-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Railway-Bold.ttf
          weight: 700
        - asset: assets/fonts/Railway-ExtraBold.ttf
          weight: 800