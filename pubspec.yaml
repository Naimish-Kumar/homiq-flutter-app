name: homiq_ai
description: Homiq AI – Virtual Interior Designer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.2.2

  # Network
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1

  # Image
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  google_fonts:

  # UI
  shimmer: ^3.0.0

  # Share
  share_plus: ^13.1.0

  # Misc
  intl: ^0.20.2
  url_launcher: ^6.2.1

  # Firebase & Auth
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1
  font_awesome_flutter: ^11.0.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  in_app_purchase: ^3.2.3
  flutter_localizations:
    sdk: flutter
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/google.png
    - assets/hero.png
    - assets/
    - assets/styles/
